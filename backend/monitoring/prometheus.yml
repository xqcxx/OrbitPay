global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: orbitpay-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080
        labels:
          service: api
          project: orbitpay

  - job_name: orbitpay-indexer
    metrics_path: /metrics
    static_configs:
      - targets:
          - indexer:8081
        labels:
          service: indexer
          project: orbitpay
